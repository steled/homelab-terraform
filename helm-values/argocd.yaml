global:
  domain: ${domain}

configs:
  cm:
    accounts.steled: apiKey, login
    accounts.steled.enabled: true
    admin.enabled: false
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      ### Internal Kubernetes resources excluded reduce the number of watched events
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request excluded reduce the number of watched events
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
    users.anonymous.enabled: false
  credentialTemplates:
    ssh-creds:
     url: git@github.com:steled
     sshPrivateKey: |
      ${apps_sshPrivateKey}
  params:
    server.insecure: true
  rbac:
    policy.csv: |
      g, steled, role:admin
  repositories:
    argocd-apps:
      url: git@github.com:steled/argocd-apps.git
  secret:
    extra:
      accounts.steled.password: ${accounts_steled_password}

server:
  certificate:
    enabled: false
    issuer:
      group: cert-manager.io
      kind: ClusterIssuer
      name: cloudflare-letsencrypt-${environment}

  ingress:
    enabled: false
    annotations:
      cert-manager.io/cluster-issuer: cloudflare-letsencrypt-${environment}
      ingress.cilium.io/loadbalancer-mode: shared
      ingress.cilium.io/tls-passthrough: enabled
      ingress.cilium.io/force-https: enabled
    ingressClassName: cilium
    tls: false

  httproute:
    enabled: true
    parentRefs:
      - name: shared-gateway
        namespace: istio-system
    hostnames:
      - ${domain}

notifications:
  notifiers:
    service.telegram: |
      token: $telegram-token
  secret:
    items:
      telegram-token: ${telegram_bot_token}
